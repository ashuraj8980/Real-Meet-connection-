<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealMeet | Elite VIP Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; }
        .card-custom { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 16px; transition: 0.3s; }
        .status-active { background-color: #22c55e; }
        .status-offline { background-color: #ef4444; }
    </style>
</head>
<body onload="processSearch('Delhi')">

    <header class="bg-black text-white p-6 shadow-2xl">
        <div class="container mx-auto text-center">
            <h1 class="text-4xl font-black italic tracking-tighter">REAL<span class="text-pink-600">MEET</span></h1>
            <div id="displayCity" class="text-xs font-bold text-pink-400 uppercase tracking-widest mt-2">DELHI</div>
            <div id="headerStats" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">INITIALIZING...</div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">
        <div class="flex bg-white p-2 rounded-2xl shadow-lg border border-gray-100 mb-6">
            <input type="text" id="cityInput" placeholder="Enter City..." class="w-full px-4 py-3 outline-none font-bold text-sm">
            <button onclick="processSearch()" class="bg-pink-600 text-white px-8 py-3 rounded-xl font-bold text-sm">SEARCH</button>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-md border border-gray-100 mb-6 text-center">
            <p class="text-xs font-black uppercase text-gray-500 mb-2">Live Availability Status</p>
            <div class="flex justify-center gap-4">
                <div class="text-green-600 font-black text-sm" id="activeLabel">0 Available for today</div>
                <div class="text-gray-300">|</div>
                <div class="text-red-500 font-black text-sm" id="closedLabel">0 Slot close</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4" id="profileGrid"></div>
    </div>

    <script>
        const names = ["Mehak", "Aarushi", "Priya", "Aisha", "Natasha", "Jiiya", "Ishaa", "Shreya", "Aadhya", "Pallavi", "Avni", "Chahat", "Surbhi", "Ishita", "Kavya", "Khushi", "Simmi", "Sinu", "Alia", "Sara"];
        
        // Unique sexy descriptions for each profile
        const descriptions = [
            "Hot night-out companion. Let's make your night unforgettable with pure intimacy.",
            "Luxury hotel dates. Fine dining & naughty surprises for high-profile men.",
            "Seductive and bold. Specializing in private, stress-free encounters.",
            "I bring the heat! Cuddle, chill, and spicy moments. Pure pleasure.",
            "Authentic companion. 100% discreet. Fulfilling your desires with class.",
            "Ready for a wild night? I offer high-end companionship and pure satisfaction.",
            "Classy, beautiful, and adventurous. Let's create some naughty memories tonight.",
            "If you want deep connection and wild vibes, look no further. Discreet meetups."
        ];

        // Diverse sexy tags
        const tagPool = ["Body Massage", "Full Satisfaction", "Oral Service", "Sensual Touch", "Night Out", "VIP Service", "Private Meet", "Deep Throat", "Sensual Kiss", "Shower Play"];

        function processSearch() {
            const city = document.getElementById('cityInput').value.trim() || "Delhi";
            document.getElementById('displayCity').innerText = city.toUpperCase();
            
            const total = Math.floor(Math.random() * (12 - 8 + 1)) + 8;
            let statuses = Array(total).fill(false);
            for(let i=0; i < Math.floor(total * 0.6); i++) statuses[i] = true;
            statuses.sort(() => Math.random() - 0.5);

            const active = statuses.filter(s => s === true).length;
            const offline = total - active;
            
            document.getElementById('activeLabel').innerText = `${active} Available for today`;
            document.getElementById('closedLabel').innerText = `${offline} Slot close`;
            document.getElementById('headerStats').innerText = `${Math.floor(Math.random()*(2500-500)+500)}+ HAPPY CUSTOMERS | REGULAR: ${Math.floor(Math.random()*(150-90+1)+90)}`;

            const grid = document.getElementById('profileGrid');
            grid.innerHTML = "";

            for(let i = 0; i < total; i++) {
                const isActive = statuses[i];
                // Unique tags per profile
                const uniqueTags = [...tagPool].sort(() => 0.5 - Math.random()).slice(0, 4).join(" | ");
                
                grid.innerHTML += `
                    <div class="card-custom shadow-sm border ${isActive ? 'border-green-200' : 'border-red-200'}">
                        <div class="relative h-40 rounded-xl overflow-hidden mb-3">
                            <img src="pic${(Math.floor(Math.random()*40)+1)}.jpg" onerror="this.src='https://via.placeholder.com/300x400'" class="w-full h-full object-cover">
                            <span class="absolute top-2 right-2 ${isActive ? 'status-active' : 'status-offline'} text-white px-3 py-1 rounded-lg text-[10px] font-bold">
                                ${isActive ? 'AVAILABLE' : 'SLOT CLOSED'}
                            </span>
                        </div>
                        <h3 class="font-black text-lg">${names[i % names.length]}</h3>
                        <p class="text-[12px] text-gray-700 italic my-2 h-14 overflow-hidden">${descriptions[i % descriptions.length]}</p>
                        <div class="text-[10px] font-bold text-pink-700 my-2 leading-snug">${uniqueTags}</div>
                        <p class="text-[10px] font-bold text-gray-600 uppercase border-t pt-2 mt-2">Available in <span class="bg-yellow-200 px-1 font-black text-black">${city.toUpperCase()}</span></p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
